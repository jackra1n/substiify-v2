services:
  postgres:
    image: postgres:18
    container_name: substiify-postgres
    restart: unless-stopped
    ports:
      - ${DB_PORT:-5440}:5432
    volumes:
      - ${POSTGRES_DATA_PATH:-./postgres-data}:/var/lib/postgresql
    environment:
      - POSTGRES_DB=${DB_NAME:-substiify}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:?error}
      - TZ=${POSTGRES_TZ:-Europe/Berlin}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  substiify:
    image: ghcr.io/jackra1n/substiify-v2:release
    container_name: substiify
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${LOGS_PATH:-./logs}:/bot/logs
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      postgres:
        condition: service_healthy

